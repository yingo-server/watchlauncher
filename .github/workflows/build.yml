name: Manual Build & Release (No Cache, Auto Tag)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK and Auto-Release
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 授予推送 tag 和创建 release 的权限

    env:
      PROJECT_DIR: .
      APK_OUTPUT: app/build/outputs/apk/debug/app-debug.apk
      GRADLE_VERSION: 5.6.4
      GRADLE_USER_HOME: /tmp/.gradle
      TAG_PREFIX: bot-v

    steps:
      - name: Checkout repository (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----- 仅生成缺失的构建文件（不覆盖已有文件） -----
      - name: Generate missing build files
        run: |
          set -e
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi

          if [ ! -f "app/build.gradle" ]; then
            printf '%s\n' \
              "apply plugin: 'com.android.application'" \
              "android {" \
              "    compileSdkVersion 19" \
              "    buildToolsVersion '26.0.2'" \
              "    defaultConfig {" \
              "        applicationId 'com.teemo.launcher'" \
              "        minSdkVersion 19" \
              "        targetSdkVersion 19" \
              "        versionCode 1" \
              "        versionName '1.0'" \
              "    }" \
              "    compileOptions {" \
              "        sourceCompatibility JavaVersion.VERSION_1_7" \
              "        targetCompatibility JavaVersion.VERSION_1_7" \
              "    }" \
              "    buildTypes {" \
              "        debug { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro' }" \
              "        release { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro' }" \
              "    }" \
              "}" \
              "dependencies {}" > app/build.gradle
            echo "Created app/build.gradle"
          else
            echo "app/build.gradle already exists, skipping"
          fi

          if [ ! -f "app/proguard-rules.pro" ]; then
            printf '%s\n' \
              "-keep class com.teemo.launcher.MainActivity { *; }" \
              "-keep class com.teemo.launcher.MainActivity$* { *; }" > app/proguard-rules.pro
            echo "Created app/proguard-rules.pro"
          else
            echo "app/proguard-rules.pro already exists, skipping"
          fi

          if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
            printf '%s\n' \
              '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.teemo.launcher">' \
              '    <uses-permission android:name="android.permission.WRITE_SETTINGS" />' \
              '    <uses-permission android:name="android.permission.VIBRATE" />' \
              '    <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">' \
              '        <activity android:name=".MainActivity" android:launchMode="singleInstance" android:excludeFromRecents="true" android:configChanges="orientation|keyboardHidden|screenSize">' \
              '            <intent-filter>' \
              '                <action android:name="android.intent.action.MAIN" />' \
              '                <category android:name="android.intent.category.HOME" />' \
              '                <category android:name="android.intent.category.DEFAULT" />' \
              '                <category android:name="android.intent.category.LAUNCHER" />' \
              '            </intent-filter>' \
              '        </activity>' \
              '    </application>' \
              '</manifest>' > app/src/main/AndroidManifest.xml
            echo "Created app/src/main/AndroidManifest.xml"
          else
            echo "AndroidManifest.xml already exists, skipping"
          fi

          if [ ! -f "app/src/main/res/values/strings.xml" ]; then
            printf '%s\n' \
              '<resources>' \
              '    <string name="app_name">桌面</string>' \
              '</resources>' > app/src/main/res/values/strings.xml
            echo "Created strings.xml"
          else
            echo "strings.xml already exists, skipping"
          fi

      # ----- 生成方形图标（仅当不存在时） -----
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate square icons if missing
        run: |
          if [ ! -f "app/src/main/res/mipmap-mdpi/ic_launcher.png" ]; then
            echo "Icons missing, generating..."
            for size in 48 72 96 144; do
              case $size in
                48)  dir="mipmap-mdpi" ;;
                72)  dir="mipmap-hdpi" ;;
                96)  dir="mipmap-xhdpi" ;;
                144) dir="mipmap-xxhdpi" ;;
              esac
              mkdir -p app/src/main/res/${dir}
              convert -size ${size}x${size} xc:#2196F3 \
                -stroke white -strokewidth 2 -fill none -draw "rectangle 2,2 $((size-3)),$((size-3))" \
                app/src/main/res/${dir}/ic_launcher.png
            done
            echo "Icons generated."
          else
            echo "Icons already exist, skipping generation."
          fi

      # ----- 安装 JDK 21（用于 SDK Manager） -----
      - name: Set up JDK 21 (for SDK manager)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ----- 设置 Android SDK -----
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK components
        run: |
          set -e
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-19"
          sdkmanager "build-tools;26.0.2"
          sdkmanager "platform-tools"
          sdkmanager "extras;android;m2repository"

      # ----- 切换至 JDK 8 用于 Gradle 构建 -----
      - name: Set up JDK 8 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip
          unzip -q gradle-${{ env.GRADLE_VERSION }}-bin.zip -d /opt/
          echo "/opt/gradle-${{ env.GRADLE_VERSION }}/bin" >> $GITHUB_PATH

      - name: Build Debug APK (no cache)
        run: |
          cd ${{ env.PROJECT_DIR }}
          gradle clean assembleDebug --info --stacktrace --no-build-cache --refresh-dependencies
        env:
          JAVA_OPTS: -Dfile.encoding=UTF-8
          GRADLE_USER_HOME: ${{ env.GRADLE_USER_HOME }}

      - name: Verify APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          if [ -f "${{ env.APK_OUTPUT }}" ]; then
            echo "APK generated successfully!"
            ls -lh "${{ env.APK_OUTPUT }}"
          else
            echo "ERROR: APK not found"
            exit 1
          fi

      # ----- 自动版本号递增（基于 bot-v* tags） -----
      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "${{ env.TAG_PREFIX }}*" | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="1.0.0"
          else
            VER=$(echo "$LATEST_TAG" | sed "s/^${{ env.TAG_PREFIX }}//")
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version will be $NEXT_VERSION"

      - name: Create and push new tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="${{ env.TAG_PREFIX }}${{ steps.version.outputs.next_version }}"
          git tag -a "$TAG_NAME" -m "Automated release $TAG_NAME"
          # 使用带 token 的 URL 推送
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" "$TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_PREFIX }}${{ steps.version.outputs.next_version }}
          files: ${{ env.PROJECT_DIR }}/${{ env.APK_OUTPUT }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
